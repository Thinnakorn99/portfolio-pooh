# Cloudflare Real IP configuration
set_real_ip_from 103.21.244.0/22;
set_real_ip_from 103.22.200.0/22;
set_real_ip_from 103.31.4.0/22;
set_real_ip_from 104.16.0.0/13;
set_real_ip_from 104.24.0.0/14;
set_real_ip_from 108.162.192.0/18;
set_real_ip_from 131.0.72.0/22;
set_real_ip_from 141.101.64.0/18;
set_real_ip_from 162.158.0.0/15;
set_real_ip_from 172.64.0.0/13;
set_real_ip_from 173.245.48.0/20;
set_real_ip_from 188.114.96.0/20;
set_real_ip_from 190.93.240.0/20;
set_real_ip_from 197.234.240.0/22;
set_real_ip_from 198.41.128.0/17;
set_real_ip_from 2400:cb00::/32;
set_real_ip_from 2606:4700::/32;
set_real_ip_from 2803:f800::/32;
set_real_ip_from 2405:b500::/32;
set_real_ip_from 2405:8100::/32;
set_real_ip_from 2a06:98c0::/29;
set_real_ip_from 2c0f:f248::/32;
real_ip_header CF-Connecting-IP;
real_ip_recursive on;

# 1. ซ่อนข้อมูล Server (Basic Hardening)
server_tokens off;

# 9. เปิด Logging เพื่อ Audit (Custom Audit Log Format)
log_format secure_audit '$remote_addr - $remote_user [$time_local] '
                        '"$request" $status $body_bytes_sent '
                        '"$http_referer" "$http_user_agent" '
                        'ReqID: $http_x_request_id';

# Upstream configuration with connection pooling
upstream api_node {
    server api:3001;
    keepalive 32; # Keep up to 32 idle connections to Node backend
}

# Map request method and URI to determine rate limit key for write operations
map "$request_method:$uri" $write_limit_key {
    default "";
    ~^POST:/api/visit$ $binary_remote_addr;
    ~^POST:/posts$ $binary_remote_addr;
    ~^DELETE:/posts/ $binary_remote_addr;
}

# 4. Rate Limiting (กันยิง / brute force / DDoS เบื้องต้น)
limit_req_zone $binary_remote_addr zone=global_limit:10m rate=30r/s;
limit_req_zone $write_limit_key zone=api_write_limit:10m rate=5r/s;
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# ==========================================
# Server Block 1: Frontend (portfolio-mheepooh.online)
# ==========================================
server {
    listen 80;
    server_name portfolio-mheepooh.online;

    # Force HTTPS (Redirect all HTTP requests to HTTPS)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name portfolio-mheepooh.online;

    # Enable HTTP/2 for multiplexing
    http2 on;

    # TLS Secure Config
    ssl_certificate /etc/nginx/ssl/nginx.crt;
    ssl_certificate_key /etc/nginx/ssl/nginx.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;

    # SSL session optimizations
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets on;

    # Security Headers (HSTS, CSP, Clickjacking, MIME-sniffing, XSS protection)
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Content-Security-Policy "default-src 'self' https: data: 'unsafe-inline' 'unsafe-eval'; frame-ancestors 'none';" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Buffer size limits
    client_body_buffer_size 16k;
    client_header_buffer_size 1k;
    large_client_header_buffers 2 1k;
    client_max_body_size 100k;

    # Timeouts
    client_body_timeout 10s;
    client_header_timeout 10s;
    keepalive_timeout 15s;
    keepalive_requests 100;
    send_timeout 10s;

    # Apply global rate limit and connection limit
    limit_req zone=global_limit burst=30 nodelay;
    limit_conn conn_limit 20;
    limit_req_status 429;
    limit_conn_status 429;

    # Apply custom logging format
    access_log /var/log/nginx/access.log secure_audit;

    # Block bad HTTP methods (allow only GET, HEAD, OPTIONS for static content)
    if ($request_method !~ ^(GET|HEAD|OPTIONS)$ ) {
        return 405;
    }

    # Block suspicious User Agents
    if ($http_user_agent ~* (sqlmap|nikto|w3af|nmap|gobuster|dirbuster|slowloris|headlesschrome|zap) ) {
        return 403;
    }

    # Block access to hidden files/folders (e.g. .git, .env)
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Block access to specific sensitive file extensions
    location ~* \.(env|pem|key|crt|git|svn|ht|bak|sql|config|yml|yaml)$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Serve static frontend files
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }
}

# ==========================================
# Server Block 2: API (api.portfolio-mheepooh.online)
# ==========================================
server {
    listen 80;
    server_name api.portfolio-mheepooh.online;

    # 3. Force HTTPS (Redirect all HTTP requests to HTTPS)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name api.portfolio-mheepooh.online;

    # Enable HTTP/2 for multiplexing
    http2 on;

    # 3. TLS Secure Config (Protocols, prefer server ciphers, and strong ciphers)
    ssl_certificate /etc/nginx/ssl/nginx.crt;
    ssl_certificate_key /etc/nginx/ssl/nginx.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;

    # SSL session optimizations to reduce handshake overhead under load
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets on;

    # 2. Security Headers (HSTS, CSP, Clickjacking, MIME-sniffing, XSS protection)
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; frame-ancestors 'none';" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Buffer size limits (mitigate buffer overflow / memory exhaustion)
    client_body_buffer_size 16k;
    client_header_buffer_size 1k;
    large_client_header_buffers 2 1k;
    
    # 8. จำกัด Upload Size (Enforce request body size limit to 100KB)
    client_max_body_size 100k;

    # Timeouts to free up idle connections quickly (mitigate connection exhaustion / Slowloris)
    client_body_timeout 10s;
    client_header_timeout 10s;
    keepalive_timeout 15s;
    keepalive_requests 100;
    send_timeout 10s;

    # Apply global rate limit and connection limit
    limit_req zone=global_limit burst=30 nodelay;
    limit_req zone=api_write_limit burst=5 nodelay;
    limit_conn conn_limit 20;
    limit_req_status 429;
    limit_conn_status 429;

    # 9. เปิด Logging เพื่อ Audit (Apply custom logging format)
    access_log /var/log/nginx/access.log secure_audit;

    # 5. Block Bad Requests / Methods (Allow only GET, POST, DELETE, OPTIONS)
    if ($request_method !~ ^(GET|POST|DELETE|OPTIONS)$ ) {
        return 405;
    }

    # 6. Block Suspicious User Agents (Block scrapers, scanners, command line tools, and ZAP)
    if ($http_user_agent ~* (sqlmap|nikto|w3af|nmap|gobuster|dirbuster|slowloris|headlesschrome|curl|wget|python|perl|zap) ) {
        return 403;
    }

    # 7. ปิดการเข้าถึงไฟล์สำคัญ (Deny access to dotfiles/folders like .git, .env)
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # 7. ปิดการเข้าถึงไฟล์สำคัญ (Deny access to specific sensitive file extensions)
    location ~* \.(env|pem|key|crt|git|svn|ht|bak|sql|config|yml|yaml)$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    location / {
        proxy_pass http://api_node;
        proxy_http_version 1.1;
        proxy_set_header Connection ""; # Required for keepalive
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Keep proxy timeouts reasonable
        proxy_connect_timeout 5s;
        proxy_send_timeout 10s;
        proxy_read_timeout 10s;
    }
}


# Upstream configuration with connection pooling
upstream api_node {
    server api:3001;
    keepalive 32; # Keep up to 32 idle connections to Node backend
}

# Map request method and URI to determine rate limit key for write operations
map "$request_method:$uri" $write_limit_key {
    default "";
    ~^POST:/api/visit$ $binary_remote_addr;
    ~^POST:/posts$ $binary_remote_addr;
    ~^DELETE:/posts/ $binary_remote_addr;
}

# Global rate limit zone (all requests): 30 requests per second per IP
limit_req_zone $binary_remote_addr zone=global_limit:10m rate=30r/s;

# Write-specific rate limit zone: 5 requests per second per IP (only applied when map matches)
limit_req_zone $write_limit_key zone=api_write_limit:10m rate=5r/s;

# Connection limiting zone (prevent TCP socket exhaustion / Slowloris)
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

server {
    listen 80;
    server_name api.portfolio-mheepooh.online;

    # Redirect all HTTP requests to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name api.portfolio-mheepooh.online;

    # Enable HTTP/2 for multiplexing (Scenario 4 optimization)
    http2 on;

    # SSL configuration
    ssl_certificate /etc/nginx/ssl/nginx.crt;
    ssl_certificate_key /etc/nginx/ssl/nginx.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # SSL session optimizations to reduce handshake overhead under load
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets on;

    # Buffer size limits (mitigate buffer overflow / memory exhaustion)
    client_body_buffer_size 16k;
    client_header_buffer_size 1k;
    large_client_header_buffers 2 1k;
    
    # Enforce request body size limit to 100KB (mitigate memory spikes from big payload Scenario 2/5)
    client_max_body_size 100k;

    # Timeouts to free up idle connections quickly (mitigate connection exhaustion / Slowloris)
    client_body_timeout 10s;
    client_header_timeout 10s;
    keepalive_timeout 15s;
    keepalive_requests 100;
    send_timeout 10s;

    # Apply global rate limit and connection limit
    limit_req zone=global_limit burst=30 nodelay;
    limit_req zone=api_write_limit burst=5 nodelay;
    limit_conn conn_limit 20;
    limit_req_status 429;
    limit_conn_status 429;

    location / {
        proxy_pass http://api_node;
        proxy_http_version 1.1;
        proxy_set_header Connection ""; # Required for keepalive
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Keep proxy timeouts reasonable
        proxy_connect_timeout 5s;
        proxy_send_timeout 10s;
        proxy_read_timeout 10s;
    }
}


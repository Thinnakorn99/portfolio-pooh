services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: portfolio-blog-api
    restart: unless-stopped
    expose:
      - "3001"
    environment:
      PORT: 3001
      MONGODB_URI: mongodb://mongo:27017
      MONGODB_DB_NAME: portfolio_blog
      MONGODB_POSTS_COLLECTION: posts
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - api_network

  nginx:
    image: nginx:alpine
    container_name: portfolio-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
    networks:
      - api_network

  mongo:
    image: mongo:7
    container_name: portfolio-blog-mongo
    restart: unless-stopped
    ports:
      - "27018:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - api_network

networks:
  api_network:
    driver: bridge

volumes:
  mongo-data:



